name: CI - AI Codebase Search Engine

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch (saves ~1.5GB vs default)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install sentence-transformers transformers tokenizers numpy tqdm
          pip install pytest pytest-cov

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-all-MiniLM-L6-v2-v1
          restore-keys: |
            hf-models-

      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        env:
          TOKENIZERS_PARALLELISM: "false"
          HF_DATASETS_OFFLINE: "1"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linting tools
        run: pip install flake8 black isort
      - name: Check formatting with black
        run: black --check --diff .
        continue-on-error: true
      - name: Check import sorting
        run: isort --check-only --diff .
        continue-on-error: true
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-complexity=10 --max-line-length=100 --statistics
        continue-on-error: true

  demo-search:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU PyTorch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install sentence-transformers transformers tokenizers numpy tqdm

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-all-MiniLM-L6-v2-v1

      - name: Run demo search on the project itself
        run: |
          echo "=== Demo: Searching for 'embedding model' in codebase ==="
          python search_engine.py --path . --query "embedding model" --top-k 3

          echo ""
          echo "=== Demo: Searching for 'file parser' ==="
          python search_engine.py --path . --query "file parser chunk" --top-k 3

          echo ""
          echo "=== Demo: Searching for 'cosine similarity search' ==="
          python search_engine.py --path . --query "cosine similarity search" --top-k 3
        env:
          TOKENIZERS_PARALLELISM: "false"
